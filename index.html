<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premier League Visualization</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
    <header>
        <h1>Premier League - Data Visualization</h1>
    </header>

    <main>
        <div id="controls">
            <label for="season-select">Season:</label>
            <select id="season-select"></select>

      
        </div>

        <section id="bar-chart">
            <div class="bar-controls">
                <label for="round-slider">Round:</label>
                <input type="range" id="round-slider" min="1" max="38" value="1">
                <span id="round-value">1</span>
            </div>
        </section>
        <section id="line-chart"></section>
        <section id="scatter-chart"></section>
        <section id="donut-chart"></section>
        <section id="spider-chart"></section>
    </main>

    <script type="module" src="js/main.js"></script>
</body>
</html>
