<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premier League Visualization</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
    <header>
        <div class="header-badge">PL</div>
        <div class="header-text">
            <span class="header-title">Premier League</span>
            <span class="header-sub">Data Visualization</span>
        </div>
    </header>

    <main>
        <div id="controls">
            <label for="season-select">Season:</label>
            <select id="season-select"></select>
        </div>

        <section id="bar-chart">
            <h2>League Standings by Gameweek</h2>
            <div class="bar-controls">
                <label for="round-slider">Round:</label>
                <input type="range" id="round-slider" min="1" max="38" value="1">
                <span id="round-value">1</span>
            </div>
        </section>

        <section id="line-chart">
            <h2>Points Trajectory</h2>
        </section>

        <section id="scatter-chart">
            <h2>Attack vs. Defense (GF/GA)</h2>
        </section>

        <section id="donut-chart">
            <h2>Match Outcomes (W/D/L)</h2>
        </section>

        <section id="spider-chart">
            <h2>Team Profile</h2>
        </section>

    </main>

    <script type="module" src="js/main.js"></script>
</body>
</html>
